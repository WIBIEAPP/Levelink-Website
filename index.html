<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>LEVELINK — Coming soon</title>
  <meta name="description" content="LEVELINK — Monitor je niveau zonder moeite. Coming soon." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg: #0b0f1a;
      --surface: #0f172a;
      --text: #e6e8ee;
      --muted:#9aa3b2;
      --accent:#66e3ff; /* cyaan accentje */
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial;color:var(--text);background:var(--bg)}
    a{color:inherit;text-decoration:none}

    /* Topbar */
    .nav{position:fixed;top:0;left:0;right:0;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:rgba(10,14,24,.5);backdrop-filter:blur(8px);border-bottom:1px solid rgba(255,255,255,.06);z-index:10}
    .brand{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:.2px}
    .dot{width:10px;height:10px;border-radius:50%;background:radial-gradient(circle at 30% 30%, var(--accent) 0%, #38bdf8 60%, transparent 70%);box-shadow:0 0 14px rgba(102,227,255,.6)}
    .links{display:flex;gap:18px;color:var(--muted);font-weight:600}
    .links a:hover{color:var(--accent)}
    .links a.active{color:#fff}

    /* Hero */
    .hero{position:relative;min-height:100vh;display:grid;place-items:center;text-align:left;overflow:hidden}
    .hero::before{content:"";position:absolute;inset:0;background:#0a0f18 url("levelink.png") center/cover no-repeat;filter:saturate(1.05) brightness(.75)}
    .hero::after{content:"";position:absolute;inset:0;background:radial-gradient(1200px 600px at 20% 40%, rgba(8,24,48,.55), transparent 60%), linear-gradient(to bottom, rgba(5,10,20,.55), rgba(5,10,20,.85))}
    .container{position:relative;z-index:1;width:100%;max-width:1080px;padding:24px}

    .badge{display:inline-flex;gap:8px;align-items:center;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);color:var(--muted);font-weight:600;font-size:12px}
    h1{font-size:clamp(32px,6vw,60px);line-height:1.05;margin:14px 0 6px 0;max-width:820px}
    .lead{color:#cbd5e1;max-width:700px;font-size:clamp(16px,2.2vw,18px)}
    .buttons{display:flex;gap:12px;margin-top:18px;flex-wrap:wrap}
    .btn{padding:12px 16px;border-radius:12px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.05);color:#fff;font-weight:800}
    .btn.primary{border:none;color:#0b1220;background:linear-gradient(90deg,var(--accent),#a7f3d0);box-shadow:0 10px 24px rgba(102,227,255,.25)}
    .note{color:var(--muted);font-size:13px;margin-top:8px}

    footer{position:relative;z-index:1;padding:28px 24px;color:var(--muted);font-size:14px;border-top:1px solid rgba(255,255,255,.06);background:rgba(5,10,20,.6)}
  </style>
</head>
<body>
  <nav class="nav" role="navigation" aria-label="Hoofdnavigatie">
    <div class="brand"><span class="dot"></span><span>LEVELINK</span></div>
    <div class="links">
      <a href="index.html" class="active">Home</a>
      <a href="contact.html">Contact</a>
    </div>
  </nav>

  <header class="hero" role="banner" aria-label="Hero met product sfeerbeeld">
    <div class="container" style="padding-top:96px">
      <span class="badge">⚡ Coming soon</span>
      <h1>Monitor je niveau zonder moeite</h1>
      <p class="lead">We werken achter de schermen aan iets moois. LEVELINK gaat binnenkort live.</p>
      <div class="buttons">
        <a class="btn primary" aria-disabled="true">Coming soon</a>
        <a class="btn" href="contact.html">Contact</a>
      </div>
      <p class="note">Wil je op de hoogte blijven? Stuur gerust een bericht via de contactpagina.</p>
    </div>
  </header>

  <footer>
    © <span id="year"></span> LEVELINK — Alle rechten voorbehouden.
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
