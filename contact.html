<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LEVELINK — Contact</title>
  <meta name="description" content="Neem contact op met LEVELINK." />
  <meta name="theme-color" content="#0b0f1a" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0b0f1a;--text:#e6e8ee;--muted:#9aa3b2;--accent:#66e3ff;--accent-2:#a7f3d0;--border:rgba(255,255,255,.10)}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--text);
         background: radial-gradient(1200px 600px at 90% 10%, #0d1530 0%, transparent 60%), linear-gradient(180deg,#0b0f1a 0%, #101828 100%);}
    a{color:inherit;text-decoration:none}

    .nav{position:fixed;inset:0 0 auto 0;height:72px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;
         background:linear-gradient(to bottom, rgba(8,12,22,.65), rgba(8,12,22,0)); border-bottom:1px solid var(--border); backdrop-filter:blur(8px) saturate(140%); z-index:50}
    .brand{display:flex;align-items:center;gap:10px;font-weight:800}
    .dot{width:10px;height:10px;border-radius:50%;background:radial-gradient(circle at 30% 30%, var(--accent) 0%, #38bdf8 60%, transparent 70%);box-shadow:0 0 16px rgba(102,227,255,.65)}
    .links{display:flex;gap:18px;font-weight:600;color:var(--muted)}
    .links a:hover{color:#fff}
    .links a.active{color:#fff}

    .wrap{max-width:920px;margin:0 auto;padding:110px 20px 40px}
    h1{font-size:clamp(28px,5.2vw,44px);margin:0 0 6px 0}
    p{color:#cbd5e1}

    .card{
      margin-top:18px; padding:20px; border-radius:16px;
      background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.12);
      box-shadow:0 18px 48px rgba(8,24,48,.28);
      backdrop-filter: blur(6px);
      transition: transform .12s ease, background .25s ease, border-color .25s ease;
    }
    .card:hover{transform:translateY(-2px); background:rgba(255,255,255,.06); border-color:rgba(255,255,255,.18)}

    .rows{display:grid; gap:10px; margin-top:8px}
    .row strong{color:#fff}
    .btn{display:inline-flex; align-items:center; gap:8px; padding:12px 16px; border-radius:14px; font-weight:800;
         border:1px solid rgba(255,255,255,.16); background:rgba(255,255,255,.05); color:#fff; transition:transform .12s ease, background .25s ease, border-color .25s ease}
    .btn:hover{transform:translateY(-1px); background:rgba(255,255,255,.07); border-color:rgba(255,255,255,.22)}
    .btn.primary{border:none;color:#08111e;background:linear-gradient(90deg,var(--accent),var(--accent-2)); box-shadow:0 14px 34px rgba(102,227,255,.28)}

    footer{border-top:1px solid var(--border);color:var(--muted);padding:28px 24px;font-size:14px;margin-top:40px}
    @media (max-width:640px){.btn{width:100%;justify-content:center}}
  </style>
</head>
<body>

    <div class="brand"><span class="dot"></span><span>LEVELINK</span></div>
    <div class="links">
      <a href="index.html">Home</a>
      <a href="contact.html" class="active">Contact</a>
    </div>
  </nav>

  <main class="wrap" role="main">
